model: late_fusion
seed: 42
img_size: 128
batch_size: 32
lr: 1.0e-4
epochs: 30
optimizer: adamw
weight_decay: 1.0e-4
scheduler: cosine
early_stopping_patience: 10
num_classes: 14
image_embed_dim: 1024
text_embed_dim: 768
fusion_hidden_dim: 512
max_text_length: 256
text_model: bert-base-uncased
freeze_text_encoder: true
